<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IPO Results Viewer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #fff;
            font-size: 14px;
        }
        .navbar {
            border-bottom: 1px solid #dee2e6;
            background-color: #fff !important;
            padding: 0.5rem 0;
        }
        .navbar-brand {
            color: #212529 !important;
            font-weight: 600;
            font-size: 1.1rem;
        }
        .nav-link {
            color: #6c757d !important;
            font-size: 0.9rem;
            padding: 0.5rem 1rem !important;
        }
        .nav-link:hover {
            color: #212529 !important;
        }
        .card {
            border: 1px solid #e9ecef;
            box-shadow: none;
            margin-bottom: 10px;
            border-radius: 4px;
        }
        .table-container {
            background: white;
            border: 1px solid #e9ecef;
            border-radius: 4px;
            padding: 0;
            overflow: hidden;
        }
        .stat-card {
            text-align: center;
            padding: 12px;
        }
        .stat-number {
            font-size: 1.75rem;
            font-weight: 600;
            color: #212529;
        }
        .stat-label {
            color: #868e96;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }
        .filter-bar {
            background: #f8f9fa;
            padding: 12px;
            margin-bottom: 15px;
            border-radius: 4px;
            border: 1px solid #e9ecef;
        }
        .filter-bar input, .filter-bar select {
            font-size: 0.875rem;
            height: 36px;
        }
        .table {
            margin-bottom: 0;
            font-size: 0.875rem;
        }
        .table thead th {
            background-color: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            color: #495057;
            padding: 12px;
        }
        .table thead th.sortable {
            cursor: pointer;
            user-select: none;
            position: relative;
        }
        .table thead th.sortable:hover {
            background-color: #e9ecef;
        }
        .table thead th.sortable::after {
            content: ' ↕';
            opacity: 0.3;
            font-size: 0.9rem;
        }
        .table thead th.sortable.asc::after {
            content: ' ↑';
            opacity: 1;
        }
        .table thead th.sortable.desc::after {
            content: ' ↓';
            opacity: 1;
        }
        .table td {
            padding: 10px 12px;
            vertical-align: middle;
        }
        .clickable-row {
            cursor: pointer;
            transition: background-color 0.15s ease;
        }
        .clickable-row:hover {
            background-color: #f8f9fa;
        }
        .badge {
            font-weight: 500;
            padding: 4px 8px;
            font-size: 0.75rem;
        }
        .badge.bg-secondary {
            background-color: #6c757d !important;
        }
        .badge.bg-success {
            background-color: #198754 !important;
        }
        .badge.bg-danger {
            background-color: #dc3545 !important;
        }
        .progress {
            background-color: #e9ecef;
        }
        .progress-bar.bg-success {
            background-color: #198754 !important;
        }
        .progress-bar.bg-danger {
            background-color: #dc3545 !important;
        }
        h2 {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .text-muted {
            font-size: 0.875rem;
        }
        code {
            font-size: 0.8rem;
            color: #495057;
            background-color: #f8f9fa;
            padding: 2px 6px;
            border-radius: 3px;
        }
        .btn {
            font-size: 0.875rem;
            padding: 6px 12px;
        }
        .quick-filter {
            display: inline-flex;
            gap: 6px;
            margin-bottom: 10px;
        }
        .quick-filter-btn {
            padding: 4px 12px;
            font-size: 0.75rem;
            border: 1px solid #dee2e6;
            background: white;
            color: #495057;
            border-radius: 3px;
            cursor: pointer;
            transition: all 0.15s ease;
        }
        .quick-filter-btn:hover {
            border-color: #adb5bd;
            background: #f8f9fa;
        }
        .quick-filter-btn.active {
            background: #212529;
            color: white;
            border-color: #212529;
        }
        .stat-row {
            margin-bottom: 15px;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-light bg-light mb-3">
        <div class="container">
            <a class="navbar-brand" href="/">IPO Results</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">Users</a>
                <a class="nav-link" href="/companies">Companies</a>
            </div>
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer class="container mt-4 mb-3">
        <p class="text-center text-muted" style="font-size: 0.75rem;">
            MeroShare IPO Results Viewer
        </p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
